<script>
    //استمارة تقييم الكسارات والمقالع
    // 11
    var givenPoints = { general: 0, Quarry: 0, Crusher: 0 };
    var totalBlackPoints = { general: 0, Quarry: 0, Crusher: 0 };
    var TotalPercentage = { general: 0, Quarry: 0, Crusher: 0 };
    var topicHeader = {
        general: "General",
        Quarry: "Quarrying",
        Crusher: "Crusher",
    };
    //var topicHeader = {
    //    general: "الشروط العامة - General",
    //    Quarry: "المقالع - Quarrying",
    //    Crusher: "الكسارة - CRUSHER",
    //};
    var Grade = '';
    var ImportantSelection = new Array(); //{ checked: false, value: 0,cat:0 };
    var RequiredAudits = new Array();
    var isFormEidtMode = false;
    var prevHeaderID = 0;
    var MinimalValuePercentage = 0;
    var rowSpan = [{ span: 2, value: 2.3 }, { span: 3, value: 2.7 }, { span: 3, value: 3.1 }, { span: 3, value: 3.2 }, { span: 3, value: 3.3 }, { span: 5, value: 3.4 }];

    $(function () {
        CreateAuditTemplate(Global.EstablishmentTypeID);

        ss.InpsectionTimeSpent = new Date();
        pleaseWait(false);
    })
    function GetAuditSubmittedData() {
        var data = { AuditServiceID: Global.AuditServiceID }
        if (parseInt(Global.AuditServiceID) <= 0) {
            return;
        }
        FetchService("post", config.GetAuditDetailsForm, JSON.stringify(data), true, function (r, xhr) {

            if (r.IsSuccess) {
                console.log(r.ResponseData);
                var res = r.ResponseData[0];
                Global.EstablishmentName = res.Establishment_NameAr;
                $('#establishmentName').html(res.Establishment_NameAr);
                if ((res.Total_Points != null && res.Total_Points != '') || res.Audit_AnimalDeptForm.length > 0) {
                    $('#comments_ID').val(res.Remarks);
                    $('#btnSubmitInspection').text(Util.getTrans('_updateInspection'));
                }
                if (res.Audit_AnimalDeptForm.length > 0) {
                    isFormEidtMode = true;
                    $.each(res.Audit_AnimalDeptForm, function (i, v) {
                        debugger;
                        $('#txtComment_' + v.LookupAuditDetailID).val(v.Comments);
                        if (v.IsChecked) {
                            $('#chk_' + v.LookupAuditDetailID).attr('data-updateid', v.ID);
                            $('#chk_' + v.LookupAuditDetailID).attr('checked', true);
                            $('#tr_' + v.LookupAuditDetailID).css("background-color", '#fff');
                            $('#tr_' + v.LookupAuditDetailID).find("input,textarea,select").prop('disabled', false);
                            $('#chk_' + v.LookupAuditDetailID).prop('disabled', false);

                            $('#givenPoints_' + v.LookupAuditDetailID).val(v.GivenPoints);
                            $("input[name='rbg_" + v.LookupAuditDetailID + "'][value=" + v.Options + "]").prop('checked', true);
                            var legestionNo = parseInt($('#givenPoints_' + v.LookupAuditDetailID).attr('data-cat'));
                            var blackpoint = parseInt($('#chk_' + v.LookupAuditDetailID).attr('data-blackpoints'));
                            var imp = parseInt($('#chk_' + v.LookupAuditDetailID).attr('data-risklevel'));
                            UpdateTotalResult(legestionNo);
                            CalculateBlackPoints(legestionNo, blackpoint, '+');
                            if (imp == 1) {
                                ImportantSelection.push({
                                    id: v.LookupAuditDetailID
                                    , checked: v.IsChecked
                                })
                            }
                        }
                    });
                    CalulateTotalGivenPints();

                    MakeFormEnableDisable();
                }
                else {
                    MakeFormEnableDisable();
                }
                debugger;
                ss.ins_img = res.Audit_Attachment.length > 0 ? JSON.stringify(res.Audit_Attachment) : null;
                GetImageControl();
            }
        });
        debugger;

    }
    function MakeFormEnableDisable() {
        if (Global.isAuditFormDisable) {
            $('#comments_ID').prop('disabled', true);
            $('#btnSubmitInspection').hide();
            $('#fromCreateAudit *').filter(':input').each(function (en, input) {
                $('#tr_' + input.dataset.id).find("input,textarea").prop('disabled', true);
            });
        }
    }
    function UpdateTotalResult(cat) {
        if (cat == 1) {
            $('.calculation1-' + cat).html(givenPoints.general);
            TotalPercentage.general = isNaN(givenPoints.general * 100 / totalBlackPoints.general) ? 0 : givenPoints.general * 100 / totalBlackPoints.general;
            $('.calculation2-' + cat).html(Util.RoundNumber(TotalPercentage.general) + "%");
            $('.calc-totalPoints-' + cat).html(totalBlackPoints.general);
        }
        else if (cat == 2) {
            $('.calculation1-' + cat).html(givenPoints.Quarry);
            TotalPercentage.Quarry = isNaN(givenPoints.Quarry * 100 / totalBlackPoints.Quarry) ? 0 : givenPoints.Quarry * 100 / totalBlackPoints.Quarry;
            $('.calculation2-' + cat).html(Util.RoundNumber(TotalPercentage.Quarry) + "%");
            $('.calc-totalPoints-' + cat).html(totalBlackPoints.Quarry);
        }
        else if (cat == 3) {
            $('.calculation1-' + cat).html(givenPoints.Crusher);
            TotalPercentage.Crusher = isNaN(givenPoints.Crusher * 100 / totalBlackPoints.Crusher) ? 0 : givenPoints.Crusher * 100 / totalBlackPoints.Crusher;
            $('.calculation2-' + cat).html(Util.RoundNumber(TotalPercentage.Crusher) + "%");
            $('.calc-totalPoints-' + cat).html(totalBlackPoints.Crusher);
        }
        MinimalValuePercentage = GetLeastValue();//Util.RoundNumber(Math.min(TotalPercentage.general, TotalPercentage.Crusher, TotalPercentage.Quarry));
        Grade = GetDegradedGrade(Util.getPercentageGrade(parseInt(MinimalValuePercentage)));
        $('.Leastpercentage').html(Util.RoundNumber(MinimalValuePercentage) + "%");
        $('.FinalEvaluation').html('<span class="finalEvalutionStyle" style="background-color:' + Util.GetGradeColor(Grade) + '"> ' +
            Grade + '</span>');
    }

    function GetDegradedGrade(grade) {
        var impPoint = [48, 52];
        var res = ImportantSelection.filter(function (r) {
            return impPoint.indexOf(r.id) > -1 && r.checked && parseInt($('#givenPoints_' + r.id).val()) == 0
        });
        if (res.length > 0) {

            if (grade == "A") {
                return "B";
            }
            else if (grade == "B") {
                return "C";
            }
            else if (grade == "C") {
                return "D";
            }
            else {
                return "D";
            }
        }
        return grade;
    }
    function SelectHeader(num) {
        num = parseInt(num);
        if (num == 1) {
            return { header: topicHeader.general, bp: totalBlackPoints.general };
        } else if (num == 2) {
            return { header: topicHeader.Quarry, bp: totalBlackPoints.Quarry };
        } else {
            return { header: topicHeader.Crusher, bp: totalBlackPoints.Crusher };
        }
    }
    function CalculateBlackPoints(cat, bp, operation) {
        if (cat == 1) {
            totalBlackPoints.general = operation == "+" ? totalBlackPoints.general + parseInt(bp) : totalBlackPoints.general - parseInt(bp);
        } else if (cat == 2) {
            totalBlackPoints.Quarry = operation == "+" ? totalBlackPoints.Quarry + parseInt(bp) : totalBlackPoints.Quarry - parseInt(bp);
        } else if (cat == 3) {
            totalBlackPoints.Crusher = operation == "+" ? totalBlackPoints.Crusher + parseInt(bp) : totalBlackPoints.Crusher - parseInt(bp);
        }
    }

    function IsHeaderChanged(curHeader) {
        curHeader = parseInt(curHeader);
        if (curHeader != prevHeaderID) {
            prevHeaderID = curHeader;
            return true;
        }
        return false;
    }
    function CreateAuditTemplate(estabTypeID) {
        // debugger;
        var row = '';
        var directionform = 'ltr';
        var html = '<table class="table table-condensed" style="direction:' + directionform + '">\
                <thead>\
                    <tr>\
                        <td style="width: 6%;"><b><span >SN</span></b></td>\
                        <td></td>\
                        <td style="width: 25%;"><b><span >Particulars</span></b></td>\
                        <td><b><span>Total Points</span></b></td>\
                         <td><b><span >Given Points</span></b></td>\
                        <td><b><span>Current Status</span></b></td>\
                        <td><b><span>Remarks</span></b></td>\
                    </tr>\
                </thead>\
                <tbody id="setTemplateTbody"></tbody>\
            </table>';
        $('#setTemplate').html(html);
        var data = JSON.stringify({ "EstablishmentTypeID": estabTypeID });
        var OldArticalNo = 0; var articalNumber;
        FetchService("post", config.GetAuditsLookup, data, false, function (r, xhr) {
            $('#TopicAudit').html(Util.Localize(r.ResponseData[0].EstablishmentTypeNameAr, r.ResponseData[0].EstablishmentTypeNameEn));
           
            if (r.IsSuccess) {
                //CalculateBlackPoints(r.ResponseData);
                $.each(r.ResponseData, function (i, v) {
                    row = "";
                    if (IsHeaderChanged(v.LegislationNo)) {
                        var head = SelectHeader(v.LegislationNo);
                        row += '<tr class="header-Topic">'
                        row += '<td colspan="7">  ' + head.header + '</td>';
                        row += '</tr>';
                    }
                    // debugger;
                    var rowspan = Util.findInJSONObject(rowSpan, { value: v.LegislationNo })[0];
                    if (OldArticalNo != v.LegislationNo) {
                        OldArticalNo = articalNumber = v.LegislationNo;
                        rowspan = rowspan == undefined ? '<td style="vertical-align: middle;text-align: center;">' + articalNumber + '</td>' : '<td style="vertical-align: middle;text-align: center;" rowspan="' + rowspan.span + '">' + articalNumber + '</td>';
                    }
                    else {
                        articalNumber = "";
                        rowspan = "";
                    }
                    var evaluation = lsUser.inslang == "ar" ? v.EvaluationAr : v.EvaluationEn;
                    evaluation = v.EvaluationEn;
                    var options = v.ActionTaken.split('-');
                    var important = v.RiskLevelID == 1 ? '<span style="color:red;font-size: 15px;">*</span>' : "";
                    var attrb = 'data-risklevel="' + v.RiskLevelID + '" data-id="' + v.ID + '" data-blackpoints= ' + v.BlackPoints + ' data-cat=' + v.LegislationNo + ' data-updateid=0';
                    row += '<tr id="tr_' + v.ID + '">'
                    row += rowspan;
                    row += '<td><input type="checkbox" id="chk_' + v.ID + '" ' + attrb + ' class="chk-col-green"   onclick= "SelectCheckbox(this)">\
                            <label ' + attrb + '  for="chk_' + v.ID + '"></label></td>';

                    row += '<td>' + important + evaluation + '</td>';
                    row += '<td>' + v.BlackPoints + '</td>';
                    row += '<td style="width:10%"><input type="text" style="text-align: center;" class="form-control" onkeyup="CalulateTotalGivenPints(this)" data-id="' + v.ID + '" data-cat=' + v.LegislationNo + ' id="givenPoints_' + v.ID + '" data-max="' + v.BlackPoints + '" /></td>';
                    var rd = ' ';
                    options.forEach(function (name) {
                        name = name.trim();
                        rd += '<input type="radio" id="' + name + '_' + v.ID + '" name="rbg_' + v.ID + '" value="' + name + '"><label for= "' + name + '_' + v.ID + '">' + name + '</label>';
                    });
                    row += '<td style="font-size:10px">' + rd + '</td>';
                    row += '<td><textarea class="form-control" id="txtComment_' + v.ID + '" style="width: unset;" cols="20" rows="1" placeholder="' + v.ControlAuthority + '"></textarea></td>';
                    row += '</tr>';

                    row = row.replace(null, '');
                    row = row.replace('null', '');
                    row = row.replace('"', '');
                    row = row.replace('"', '');

                    $('#setTemplateTbody').append(row);
                    $('#tr_' + v.ID).find("input,textarea,select").prop('disabled', true);
                    $('#chk_' + v.ID).prop('disabled', false);
                    $('#tr_' + v.ID).css("background-color", 'rgb(236, 234, 234)');
                })

                for (i = 1; i < 4; i++) {
                    row = '';
                    var head = SelectHeader(i);
                    row += '<tr class="header-Topic">'
                    row += '<td colspan="3">  ' + head.header + '</td>';
                    row += '<td colspan="2">  <span data-tran="_totalPoints"></span> : <span class="calc-totalPoints-' + i + '">0</span> </td>';
                    row += '<td colspan="1">  <span data-tran="_givenPoints"></span> : <span class="calculation1-' + i + '">0</span></td>';
                    row += '<td colspan="1">  <span class="calculation2-' + i + '"> 0%</span></td>';

                    row += '</tr>';
                    $('#setTemplateTbody').append(row);
                }
                row = '';
                row += '<tr class="header-Topic">'
                row += '<td colspan="3">  <span data-tran="_leastPerOf3Sections"></span></td>';
                row += '<td colspan="4" >  <span class="Leastpercentage"></span>    </td>';
                row += '</tr>';
                $('#setTemplateTbody').append(row);
                row = '';
                row += '<tr class="header-Topic">'
                row += '<td colspan="3">  <span data-tran="_finalEvaluation"></span></td>';
                row += '<td colspan="4" >  <span class="FinalEvaluation"></span>    </td>';
                row += '</tr>';
                $('#setTemplateTbody').append(row);

                GetAuditSubmittedData();
            }
            else {
                swal(Util.getTrans('_error'), Util.getTrans('_errorMsg'), 'error');
            }
        });
    }

    function CalulateTotalGivenPints(e) {
        givenPoints.general = 0;
        givenPoints.Quarry = 0;
        givenPoints.Crusher = 0;
        $('#fromCreateAudit *').filter('[data-cat]').each(function (e, input) {
            // debugger;
            var maxValue = parseInt(input.dataset.max);
            if (input.value != "" && input.value <= maxValue) {
                var cat = parseInt(input.dataset.cat);
                if (cat == 1) {
                    givenPoints.general += parseInt(input.value);
                }
                else if (cat == 2) {
                    givenPoints.Quarry += parseInt(input.value);
                }
                else if (cat == 3) {
                    givenPoints.Crusher += parseInt(input.value);
                }
                UpdateTotalResult(cat);
            }
            else {
                input.value = '';
            }
        });

    }

    function SelectCheckbox(e) {
        debugger;

        if (e.id.substr(0, 3) == "chk") {
            var id = e.id.substr(4);
            var cat = parseInt(e.dataset.cat);
            var bp = parseInt(e.dataset.blackpoints);
            var imp = parseInt(e.dataset.risklevel);
            if (!e.checked) {
                $('#tr_' + id).find("input,textarea,select").prop('disabled', true);
                $('#chk_' + id).prop('disabled', false);
                $('#tr_' + id).css("background-color", 'rgb(236, 234, 234)');
                $('#givenPoints_' + id).val('');
                CalculateBlackPoints(cat, bp, '-');

            } else {
                $('#tr_' + id).find("input,textarea,select").prop('disabled', false);
                $('#chk_' + id).prop('disabled', false);
                $('#tr_' + id).css("background-color", 'white');

                CalculateBlackPoints(cat, bp, '+');
            }
            if (imp == 1) {
                ImportantSelection.push({
                    id: parseInt(id), checked: e.checked
                });
            }
            CalulateTotalGivenPints();
            UpdateTotalResult(cat);
        }
    }
    function GetLeastValue() {
        var arr = [TotalPercentage.general, TotalPercentage.Crusher, TotalPercentage.Quarry];
        var res = arr.filter(val => val != 0);
        return Math.min.apply(Math, res);
    }

    function SubmitInpsection(e) {
        debugger;
        if ($('#comments_ID').val().trim() == "") {
            swal('', Util.getTrans('_requiredField'), 'warning');
            return false;
        }
        var AuditDetailList = new Array();

        $('#fromCreateAudit *').filter(':input').each(function (e, input) {
            if (input.type == "checkbox") {
                var ID = input.dataset.id;
                var comments = $('#txtComment_' + ID).val();
                var isChecked = $('#chk_' + ID).prop('checked');
                var givenPoint = $('#givenPoints_' + ID).val();
                var options = $("input[name='rbg_" + ID + "']:checked").val();
                if (isChecked) {
                    AuditDetailList.push({
                        AuditServiceID: Global.AuditServiceID,
                        LookupAuditDetailID: ID,
                        Comments: comments,
                        IsChecked: isChecked,
                        Options: options,
                        GivenPoints: givenPoint == '' ? 0 : givenPoint,
                        updateID: $('#chk_' + ID).attr('data-updateid'),
                        InspectorID: lsUser.UserID,
                    });
                }
            }
        })
        var FormSubmitModel = {
            AuditDetailList: AuditDetailList,
            AuditServiceID: Global.AuditServiceID
        };
        var autocoments = "<div>" + topicHeader.general + " : " + Util.RoundNumber(TotalPercentage.general) + "%</div>" +
            "<div>" + topicHeader.Crusher + " : " + Util.RoundNumber(TotalPercentage.Crusher) + "%</div>" +
            "<div>" + topicHeader.Quarry + " : " + Util.RoundNumber(TotalPercentage.Quarry) + "%</div>";

        var asessment = GetLeastValue();
        var RA = CalculateNextVisit();
        var AuditService = {
            Inspector_ID: lsUser.UserID,
            ID: Global.AuditServiceID,
            GPS_Cord: lat + "," + lng,
            //NextVisit_Date: new Date(),
            Rating: Grade,
            Remarks: $('#comments_ID').val(),
            Auto_Remarks: autocoments,
            TimeSpent: Util.TimeSpent(ss.InpsectionTimeSpent),
            Total_Points: parseInt(asessment),
            RiskLevel_ID: CalculateRiskLevel(Grade),
            ToEmp_ID: lsUser.UserID,
            IsEditMode: isFormEidtMode,
            RequiredAudits: RA,
            IsEnviroTaqeem: true,
        };

        $('#btnSubmitInspection').prop('disabled', true);
        //console.log(AuditDetailList);
        FetchService('post', config.UpdateAuditsService, JSON.stringify(AuditService), true, function (r, xhr) {
            console.log(r);
            if (r.IsSuccess) {
                FetchService("post", config.PostAuditDetailsForm, JSON.stringify(FormSubmitModel), true, function (r, xhr) {
                    if (r.IsSuccess) {
                        debugger;
                        var msg = ''; var daysMsg = '';
                        $.each(RA, function (i, v) {
                            daysMsg += Util.AddDays(v) + ",";
                        });
                        daysMsg = daysMsg.substr(0, daysMsg.length - 1);
                        msg = Util.getTrans('_nextVisitSchdule') + daysMsg + " ";

                        CloseModal('#model_AuditDetail');
                        swal(Util.getTrans('_success'), Util.getTrans('_successDone'), 'success');
                        //swal(Util.getTrans('_success'), msg, 'success');
                    } else {
                        $('#btnSubmitInspection').prop('disabled', false);
                        swal(Util.getTrans('_error'), Util.getTrans('_errorMsg'), 'error');
                    }
                })

            } else {
                $('#btnSubmitInspection').prop('disabled', false);
                swal(Util.getTrans('_error'), Util.getTrans('_errorMsg'), 'error');
            }
        });
        return false;

    }
    function CalculateRiskLevel(Grade) {
        if (Grade == "A") {
            return 3;
        }
        else if (Grade == "B") {
            return 2;
        }
        else if (Grade == "C") {
            return 1;
        }
        else if (Grade == "D") {
            return 1;
        }
    }
    function CalculateNextVisit() {
        //A = mar31 / june30 ------ 30 sep / 30nov
        //B = 31 jan / 28 feb / mar31 / apr30 / may31 / 30june-------- july31 / aug31 / sep30 / oct31 / nov30/31dec
        //C, D =
        //15 jan, 30 jan
        //15 feb, 28 feb
        //15 mar, 31 mar
        //15 apr, 30 apr
        //15 may, 31 may
        //15 july, 31 july
        //15 sep, 30 sep
        //15 oct, 30 oc
        //15 nov, 30 nov
        if (Grade == "A") {
            return [87, 179];
        }
        else if (Grade == "B") {
            return [28, 57, 87, 117, 147, 179]; // feb,mar,apr,may,june,july
        }
        else if (Grade == "C" || Grade == "D") {
            return [14, 29, 45, 57, 73, 87, 103, 117, 133, 147, 164, 179];
        }
    }
</script>
