    <div class="modal fade" id="model_showDeatil" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <a class="btn btn-link waves-effect" onclick="CloseModal('#model_showDeatil')"
                   style="background-color: beige;">
                    <span data-tran="_close"></span>
                </a>
                <div class="modal-body" id="ubody">
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>

                </div>
                <div style="padding:10px 18px">
                    <button class="btn btn-danger btnUpdateGPS" style="display:none" data-id="" onclick="UpdateGPSEstablistment(this)"><span data-tran="_update"></span></button>
                    <!--<button class="btn btn-success" data-dismiss="modal"><span data-tran="_ok"></span></button>-->
                </div>
            </div>
            <div class="modal-footer">

            </div>
        </div>
    </div>
    <div class="modal fade" id="model_AuditDetail" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document" style="width:calc(100% - 25px) !important;">
            <div class="modal-content">
                <a class="btn btn-link waves-effect" onclick="CloseModal('#model_AuditDetail')" style="background-color: beige;">
                    <span data-tran="_close"></span>
                </a>
                <div class="modal-body" id="ubody_AuditDetail">
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
            </div>
        </div>
    </div>

    <div class="modal fade" id="mdModalNotification" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document" style="width:72% !important">
            <div class="modal-content">
                <!--<div class="modal-header">
                    <h4 class="modal-title" id="defaultModalLabel"> NOTIFICATIONS</h4>
                </div>-->
                <div class="modal-body" id="body_notificationList"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-link waves-effect" data-dismiss="modal" onclick="CloseModal('#mdModalNotification')">
                        <span data-tran="_cancel"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Page Loader -->
    <div class="page-loader-wrapper">
        <div class="loader">
            <div class="preloader">
                <div class="spinner-layer pl-green">
                    <div class="circle-clipper left">
                        <div class="circle"></div>
                    </div>
                    <div class="circle-clipper right">
                        <div class="circle"></div>
                    </div>
                </div>
            </div>
            <p><span data-tran="_pleaseWait"></span></p>
            <div>
                <a href="javascript:void(0)" onclick="disableLoading()">
                    <span data-tran="_cancel"></span>
                </a>
            </div>
        </div>
    </div>
